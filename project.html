    <script src="data/projectData.js"></script>
    <script src="modules/projectPage.js"></script>
    <script src="ui.js"></script>
    <script src="script.js"></script>
    <script>
      // Dynamically update <title> and meta description once projectData is available
      (function () {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if (id && typeof projectData !== 'undefined' && projectData[id]) {
          const p = projectData[id];
          document.title = p.title + ' — Geofrey Gapasin Portfolio';
          const desc = document.querySelector('meta[name="description"]');
          if (desc) desc.setAttribute('content', p.subtitle || p.title);
          const ogTitle = document.querySelector('meta[property="og:title"]');
          if (ogTitle) ogTitle.setAttribute('content', p.title + ' — Geofrey Gapasin');
          const ogDesc = document.querySelector('meta[property="og:description"]');
          if (ogDesc) ogDesc.setAttribute('content', p.subtitle || p.title);
          if (p.image) {
            const ogImg = document.querySelector('meta[property="og:image"]');
            if (ogImg) ogImg.setAttribute('content', 'https://john-pio.github.io/Geofrey-Resume/' + p.image);
          }

          // BreadcrumbList schema
          const breadcrumb = document.createElement('script');
          breadcrumb.type = 'application/ld+json';
          breadcrumb.id = 'breadcrumb-jsonld';
          breadcrumb.text = JSON.stringify({
            "@context": "https://schema.org",
            "@type": "BreadcrumbList",
            "itemListElement": [
              { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://john-pio.github.io/Geofrey-Resume/" },
              { "@type": "ListItem", "position": 2, "name": "Work", "item": "https://john-pio.github.io/Geofrey-Resume/work.html" },
              { "@type": "ListItem", "position": 3, "name": p.title, "item": "https://john-pio.github.io/Geofrey-Resume/project.html?id=" + id }
            ]
          });
          document.head.appendChild(breadcrumb);
        }
      })();
    </script>
</body>
